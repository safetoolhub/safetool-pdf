# This workflow is prepared but NOT auto-triggered.
# Trigger manually via workflow_dispatch only.

name: Build SafeTool PDF

on:
  workflow_dispatch:
    inputs:
      build_linux:
        description: "Build Linux (AppImage)"
        type: boolean
        default: true
      build_macos:
        description: "Build macOS (DMG)"
        type: boolean
        default: true
      build_windows:
        description: "Build Windows (Installer)"
        type: boolean
        default: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ===========================================================================
  # Linux — PyInstaller → .deb + .rpm + AppImage
  # ===========================================================================
  build-linux:
    if: ${{ github.event.inputs.build_linux == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-glx \
            libegl1 \
            libxkbcommon0 \
            libdbus-1-3 \
            fuse \
            squashfs-tools

      - name: Install appimagetool
        run: |
          sudo wget -q \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build (PyInstaller + .deb + .rpm + AppImage)
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: python dev-tools/build.py

      - name: Upload deb
        uses: actions/upload-artifact@v7
        with:
          name: SafeTool-PDF-linux-deb
          path: dist/SafeToolPDF-*-linux-amd64.deb
          if-no-files-found: error

      - name: Upload rpm
        uses: actions/upload-artifact@v7
        with:
          name: SafeTool-PDF-linux-rpm
          path: dist/SafeToolPDF-*-linux-x86_64.rpm
          if-no-files-found: error

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: SafeTool-PDF-linux-x86_64-AppImage
          path: dist/SafeToolPDF-*-linux-x86_64.AppImage
          if-no-files-found: error

  # ===========================================================================
  # macOS — PyInstaller → .app → DMG
  # ===========================================================================
  build-macos:
    if: ${{ github.event.inputs.build_macos == 'true' }}
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          brew install create-dmg || true

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm packaging/pyinstaller/safetool-pdf.spec

      - name: Build macOS DMG
        run: |
          chmod +x packaging/macos/build_macos.sh
          packaging/macos/build_macos.sh

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: SafeTool PDF-macOS-DMG
          path: dist/SafeTool PDF.dmg
          if-no-files-found: error

  # ===========================================================================
  # Windows — PyInstaller → Inno Setup installer
  # ===========================================================================
  build-windows:
    if: ${{ github.event.inputs.build_windows == 'true' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download vendored Ghostscript
        run: python packaging/scripts/download_ghostscript.py
        continue-on-error: true

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm packaging/pyinstaller/safetool-pdf.spec

      - name: Build installer (Inno Setup)
        run: |
          choco install innosetup -y --no-progress
          iscc packaging/windows/safetool-pdf.iss

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: SafeTool PDF-windows-x64-setup
          path: dist/SafeTool PDF-*-setup-x64.exe
          if-no-files-found: error

      - name: Upload portable
        uses: actions/upload-artifact@v7
        with:
          name: SafeTool PDF-windows-x64-portable
          path: dist/SafeTool PDF/
          if-no-files-found: error
