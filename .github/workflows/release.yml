name: Release

# Builds binaries for all platforms and creates a DRAFT GitHub Release.
# The release stays PRIVATE until you manually publish it from the GitHub UI.
# Nothing is public until YOU click "Publish" on the draft release.
#
# Triggers:
#   - Tag push v*         → full release: test + build + draft release
#   - dry-run/* branch    → dry-run: test + build (no release created)
#   - Manual dispatch     → full release with explicit tag
#
# Linux artifacts: .deb, .rpm (GPG signed), .AppImage, .flatpak
# Windows: Inno Setup installer (.exe)
# macOS: .dmg

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0-beta). Must already exist as a git tag.'
        required: true
        type: string
  push:
    tags:
      - "v*"
    branches:
      - "dry-run/**"

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Test: Run the full test suite before building
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ghostscript \
            libegl1 libgl1 libglib2.0-0 libdbus-1-3 \
            libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0

      - name: Install Python dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Validate translations
        run: uv run python dev-tools/validate_translations.py

      - name: Run test suite
        run: uv run python -m pytest --tb=short -q
        env:
          QT_QPA_PLATFORM: offscreen

  # ──────────────────────────────────────────────────────────────────────────
  # Build: Linux (.deb + .rpm + .AppImage via build.py, then GPG sign)
  # ──────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    needs: [test]
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt
          uv pip install pyinstaller

      - name: Install packaging tools and Qt dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential rpm dpkg-sig libegl1 libgl1 libglib2.0-0 libdbus-1-3 \
            libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 \
            libfuse2

      - name: Install appimagetool
        run: |
          sudo wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool
          echo "✅ appimagetool installed:"
          ls -lh /usr/local/bin/appimagetool
          file /usr/local/bin/appimagetool

      - name: Download vendored Ghostscript
        run: uv run python packaging/scripts/download_ghostscript.py

      - name: Build with PyInstaller + package (.deb, .rpm, .AppImage)
        run: |
          uv run python dev-tools/build.py
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Verify build artifacts
        run: |
          echo "=== Build artifacts in dist/ ==="
          ls -lh dist/
          echo ""
          echo "=== Linux packages ==="
          ls -lh dist/SafeToolPDF-*-linux-* 2>/dev/null || echo "No Linux packages found"

      # ── GPG Sign .deb and .rpm ──
      - name: Check GPG key availability
        id: gpg-check
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  GPG_PRIVATE_KEY not set — packages will NOT be signed"
          fi
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Import GPG key
        if: steps.gpg-check.outputs.has_key == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_FPR=$(gpg --list-keys --with-colons | grep '^fpr' | head -1 | cut -d: -f10)
          echo "${KEY_FPR}:6:" | gpg --import-ownertrust

      - name: Sign .deb packages
        if: steps.gpg-check.outputs.has_key == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          for deb in dist/SafeToolPDF-*.deb; do
            [ -f "$deb" ] || continue
            echo "Signing $deb ..."
            dpkg-sig --sign builder -g "--batch --pinentry-mode loopback --passphrase '${GPG_PASSPHRASE}'" "$deb"
            echo "✅ Signed: $deb"
          done

      - name: Sign .rpm packages
        if: steps.gpg-check.outputs.has_key == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          KEY_ID=$(gpg --list-keys --with-colons | grep '^pub' | head -1 | cut -d: -f5)
          printf '%%_signature gpg\n%%_gpg_name %s\n%%__gpg_sign_cmd %%{__gpg} gpg --batch --pinentry-mode loopback --passphrase '"'"'%s'"'"' --no-verbose --no-armor -u "%%{_gpg_name}" -sbo %%{__signature_filename} --digest-algo sha256 %%{__plaintext_filename}\n' \
            "$KEY_ID" "$GPG_PASSPHRASE" > ~/.rpmmacros

          for rpm_file in dist/SafeToolPDF-*.rpm; do
            [ -f "$rpm_file" ] || continue
            echo "Signing $rpm_file ..."
            rpmsign --addsign "$rpm_file"
            echo "✅ Signed: $rpm_file"
          done

      - name: Generate SHA256 checksums for Linux artifacts
        run: |
          cd dist
          for f in SafeToolPDF-*-linux-*; do
            [ -f "$f" ] || continue
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: |
            dist/SafeToolPDF-*-linux-*.deb
            dist/SafeToolPDF-*-linux-*.rpm
            dist/SafeToolPDF-*-linux-*.AppImage
            dist/SafeToolPDF-*-linux-*.sha256
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────────
  # Build: Linux Flatpak (.flatpak bundle)
  # ──────────────────────────────────────────────────────────────────────────
  build-flatpak:
    name: Build Flatpak
    needs: [test]
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt
          uv pip install pyinstaller

      - name: Install Flatpak & flatpak-builder
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential flatpak flatpak-builder elfutils \
            libegl1 libgl1 libglib2.0-0 libdbus-1-3 \
            libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0

      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak SDK
        run: |
          flatpak install --user -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            TAG="${TAG#v}"
          elif [[ "$GITHUB_REF" == refs/heads/dry-run/* ]]; then
            TAG="${GITHUB_REF#refs/heads/dry-run/}"
            TAG="${TAG#v}"
          else
            TAG="${GITHUB_REF#refs/tags/v}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download vendored Ghostscript
        run: uv run python packaging/scripts/download_ghostscript.py

      - name: Build PyInstaller binary
        run: |
          uv run python dev-tools/build.py --skip-installer
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Build Flatpak bundle
        run: |
          FULL_VERSION="${{ steps.version.outputs.tag }}"
          APP_ID="org.safetoolhub.safetoolpdf"

          BUILD_DIR="flatpak-build"
          REPO_DIR="flatpak-repo"
          rm -rf "$BUILD_DIR" "$REPO_DIR"

          flatpak-builder --user --force-clean \
            --repo="$REPO_DIR" \
            "$BUILD_DIR" \
            packaging/linux/flatpak/org.safetoolhub.safetoolpdf.yml

          BUNDLE_NAME="SafeToolPDF-${FULL_VERSION}-linux-x86_64.flatpak"
          flatpak build-bundle "$REPO_DIR" "dist/${BUNDLE_NAME}" "$APP_ID"
          echo "✅ Flatpak bundle: dist/${BUNDLE_NAME}"

      - name: Generate SHA256 checksums for Flatpak
        run: |
          cd dist
          for f in SafeToolPDF-*.flatpak; do
            [ -f "$f" ] || continue
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Upload Flatpak artifacts
        uses: actions/upload-artifact@v7
        with:
          name: flatpak-artifacts
          path: |
            dist/SafeToolPDF-*-linux-*.flatpak
            dist/SafeToolPDF-*-linux-*.flatpak.sha256
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────────
  # Build: Windows (Inno Setup installer)
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: [test]
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt
          uv pip install pyinstaller

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            TAG="${TAG#v}"
          elif [[ "$GITHUB_REF" == refs/heads/dry-run/* ]]; then
            TAG="${GITHUB_REF#refs/heads/dry-run/}"
            TAG="${TAG#v}"
          else
            TAG="${GITHUB_REF#refs/tags/v}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download vendored Ghostscript
        run: uv run python packaging/scripts/download_ghostscript.py

      - name: Build with PyInstaller + package
        run: |
          uv run python dev-tools/build.py
        env:
          APP_VERSION: ${{ steps.version.outputs.tag }}
          PYTHONUTF8: "1"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: dist/SafeToolPDF-*-windows-setup.exe
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────────
  # Build: macOS (.dmg)
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    needs: [test]
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt
          uv pip install pyinstaller

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Generate macOS icon (.icns)
        run: |
          ICONSET="assets/icon.iconset"
          mkdir -p "$ICONSET"
          for size in 16 32 64 128 256 512; do
            sips -z $size $size assets/icon.png --out "$ICONSET/icon_${size}x${size}.png"
          done
          for size in 32 64 256 512 1024; do
            half=$((size / 2))
            sips -z $size $size assets/icon.png --out "$ICONSET/icon_${half}x${half}@2x.png"
          done
          iconutil -c icns "$ICONSET" -o assets/icon.icns

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            TAG="${TAG#v}"
          elif [[ "$GITHUB_REF" == refs/heads/dry-run/* ]]; then
            TAG="${GITHUB_REF#refs/heads/dry-run/}"
            TAG="${TAG#v}"
          else
            TAG="${GITHUB_REF#refs/tags/v}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download vendored Ghostscript
        run: uv run python packaging/scripts/download_ghostscript.py

      - name: Build with PyInstaller + package
        run: |
          uv run python dev-tools/build.py
        env:
          APP_VERSION: ${{ steps.version.outputs.tag }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: dist/SafeToolPDF-*-macos.dmg
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────────────
  # Create DRAFT Release (NOT public until you manually publish)
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Create Draft Release
    if: ${{ !startsWith(github.ref, 'refs/heads/dry-run/') }}
    needs: [build-linux, build-flatpak, build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "Release artifacts:"
          find release-assets -type f | sort

      - name: Determine pre-release status
        id: prerelease
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            TAG="${TAG#v}"
          elif [[ "$GITHUB_REF" == refs/heads/dry-run/* ]]; then
            TAG="${GITHUB_REF#refs/heads/dry-run/}"
            TAG="${TAG#v}"
          else
            TAG="${GITHUB_REF#refs/tags/v}"
          fi
          if echo "$TAG" | grep -qE '(alpha|beta|rc|dev)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create DRAFT GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.prerelease.outputs.tag }}
          name: "SafeTool PDF v${{ steps.prerelease.outputs.tag }}"
          draft: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
